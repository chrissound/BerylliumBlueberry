name: blog3000
version: '0.2.0.0'
author: CabalSaneDefault
maintainer: nobody
license: BSD3
extra-source-files:
- ChangeLog.md
dependencies:
- HUnit
- aeson
- aeson-pretty
- base
- base64-bytestring
- binary
- binary-orphans
- binary-instances
- bytestring
- containers
- cookie
- data-default
- directory
- entropy
- extra
- formatting
- http-types
- lucid
- mtl
- niobiumcoconut >= 0.4.0.0
- niobiumcoconut-lucid
- pandoc
- postgresql-simple
- pretty-simple
- neat-interpolation
- QuickCheck
- scotty
- scotty-cookie
- stm
- string-conversions
- tasty
- tasty-hunit
- text
- time
- transformers
- wai
- wai-extra
- wai-middleware-static
- xhtml
- http-test
- pureMD5
- typed-process
- MissingH
library: 
  ghc-options: -Wall
  source-dirs: src
executables:
  blog3000-app:
    main: Main.hs
    source-dirs: src
    ghc-options: -Wall -O2
default-extensions: 
  - LambdaCase
